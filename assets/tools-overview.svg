  <rect x="260" y="268" width="250" height="160" rx="14" fill="#fff" stroke="#ef4444" stroke-width="0.8" filter="url(#tSh)"/>
  <text x="385" y="290" text-anchor="middle" font-family="'SF Pro Display','Inter',sans-serif" font-size="12" font-weight="700" fill="#dc2626">DRIVER &amp; HOTSPOTS</text>
  <g font-family="'SF Mono',monospace" font-size="10" fill="#475569">
    <circle cx="280" cy="308" r="3" fill="#ef4444"/><text x="290" y="312">assess_driver_mutation</text>
    <circle cx="280" cy="326" r="3" fill="#ef4444"/><text x="290" y="330">lookup_cancer_hotspots</text>
    <circle cx="280" cy="344" r="3" fill="#ef4444"/><text x="290" y="348">search_variant_literature_litvar</text>
  </g>
  <rect x="452" y="358" width="38" height="14" rx="7" fill="#ef4444" fill-opacity="0.1"/>
  <text x="471" y="368" text-anchor="middle" font-family="'SF Mono',monospace" font-size="9" font-weight="600" fill="#dc2626">3</text>
  <text x="280" y="388" font-family="'SF Mono',monospace" font-size="8.5" fill="#94a3b8">Cancer Hotspots + LitVar2 + 7-signal</text>
  <text x="280" y="402" font-family="'SF Mono',monospace" font-size="8.5" fill="#94a3b8">cross-ref driver classification</text>

  <!-- Discovery & Format -->
  <rect x="530" y="268" width="200" height="160" rx="14" fill="#fff" stroke="#ec4899" stroke-width="0.8" filter="url(#tSh)"/>
  <text x="630" y="290" text-anchor="middle" font-family="'SF Pro Display','Inter',sans-serif" font-size="12" font-weight="700" fill="#db2777">DISCOVERY</text>
  <g font-family="'SF Mono',monospace" font-size="10" fill="#475569">
    <circle cx="550" cy="308" r="3" fill="#ec4899"/><text x="560" y="312">lookup_gene</text>
    <circle cx="550" cy="326" r="3" fill="#ec4899"/><text x="560" y="330">lookup_disease</text>
    <circle cx="550" cy="344" r="3" fill="#ec4899"/><text x="560" y="348">lookup_therapy</text>
  </g>
  <rect x="672" y="358" width="38" height="14" rx="7" fill="#ec4899" fill-opacity="0.1"/>
  <text x="691" y="368" text-anchor="middle" font-family="'SF Mono',monospace" font-size="9" font-weight="600" fill="#db2777">3</text>

  <!-- Output format note -->
  <rect x="750" y="268" width="190" height="160" rx="14" fill="#fff" stroke="#64748b" stroke-width="0.6" filter="url(#tSh)"/>
  <text x="845" y="292" text-anchor="middle" font-family="'SF Pro Display','Inter',sans-serif" font-size="11" font-weight="700" fill="#475569">OUTPUT FORMATS</text>
  <g font-family="'SF Mono',monospace" font-size="9.5">
    <rect x="770" y="308" width="150" height="22" rx="6" fill="#0ea5e9" fill-opacity="0.06" stroke="#0ea5e9" stroke-width="0.4"/>
    <text x="845" y="323" text-anchor="middle" fill="#0ea5e9">markdown (default)</text>
    <rect x="770" y="338" width="150" height="22" rx="6" fill="#22c55e" fill-opacity="0.06" stroke="#22c55e" stroke-width="0.4"/>
    <text x="845" y="353" text-anchor="middle" fill="#16a34a">json (structured)</text>
    <rect x="770" y="368" width="150" height="22" rx="6" fill="#f59e0b" fill-opacity="0.06" stroke="#f59e0b" stroke-width="0.4"/>
    <text x="845" y="383" text-anchor="middle" fill="#d97706">text (plain)</text>
  </g>
  <text x="845" y="414" text-anchor="middle" font-family="'SF Mono',monospace" font-size="8.5" fill="#94a3b8">All 29 tools support</text>
  <text x="845" y="426" text-anchor="middle" font-family="'SF Mono',monospace" font-size="8.5" fill="#94a3b8">all 3 output formats</text>

  <!-- Footer -->
  <text x="480" y="460" text-anchor="middle" font-family="'SF Mono',monospace" font-size="10" fill="#475569" font-weight="600">7 + 5 + 6 + 5 + 3 + 3 = 29 tools</text>
  <text x="480" y="478" text-anchor="middle" font-family="'SF Mono',monospace" font-size="9" fill="#94a3b8">10 data sources | 4 classification frameworks | Driver mutation cross-reference</text>
  <text x="480" y="494" text-anchor="middle" font-family="'SF Mono',monospace" font-size="9" fill="#94a3b8">NLP: 35+ disease + 40+ therapy aliases | GRCh37/38 aware</text>

  <text x="480" y="550" text-anchor="middle" font-family="'SF Mono',monospace" font-size="8.5" fill="#cbd5e1">CAPVIC v1.0.6 — Vivax Teknoloji A.S.</text>
</svg>
