<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" width="960" height="560">
  <defs>
    <filter id="tSh">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#94a3b8" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="960" height="560" rx="16" fill="#f8fafc"/>
  <text x="480" y="32" text-anchor="middle" font-family="'SF Pro Display','Inter',sans-serif" font-size="18" font-weight="800" letter-spacing="1" fill="#0f172a">29 MCP Tools</text>
  <rect x="380" y="40" width="200" height="2" rx="1" fill="#0ea5e9" opacity="0.25"/>

  <!-- Search & Discovery -->
  <rect x="20" y="58" width="290" height="190" rx="14" fill="#fff" stroke="#0ea5e9" stroke-width="0.8" filter="url(#tSh)"/>
  <text x="165" y="80" text-anchor="middle" font-family="'SF Pro Display','Inter',sans-serif" font-size="12" font-weight="700" fill="#0ea5e9">SEARCH &amp; DISCOVERY</text>
  <g font-family="'SF Mono',monospace" font-size="10" fill="#475569">
    <circle cx="40" cy="98" r="3" fill="#0ea5e9"/><text x="50" y="102">variant_search_evidence</text>
    <circle cx="40" cy="116" r="3" fill="#0ea5e9"/><text x="50" y="120">civic_search_evidence</text>
    <circle cx="40" cy="134" r="3" fill="#0ea5e9"/><text x="50" y="138">civic_search_assertions</text>
    <circle cx="40" cy="152" r="3" fill="#0ea5e9"/><text x="50" y="156">clinvar_search</text>
    <circle cx="40" cy="170" r="3" fill="#0ea5e9"/><text x="50" y="174">search_literature</text>
    <circle cx="40" cy="188" r="3" fill="#0ea5e9"/><text x="50" y="192">variant_compare_sources</text>
    <circle cx="40" cy="206" r="3" fill="#0ea5e9"/><text x="50" y="210">variant_pathogenicity_summary</text>
  </g>
  <rect x="250" y="228" width="38" height="14" rx="7" fill="#0ea5e9" fill-opacity="0.1"/>
  <text x="269" y="238" text-anchor="middle" font-family="'SF Mono',monospace" font-size="9" font-weight="600" fill="#0ea5e9">7</text>

  <!-- Classification -->
  <rect x="330" y="58" width="290" height="190" rx="14" fill="#fff" stroke="#8b5cf6" stroke-width="0.8" filter="url(#tSh)"/>
  <text x="475" y="80" text-anchor="middle" font-family="'SF Pro Display','Inter',sans-serif" font-size="12" font-weight="700" fill="#7c3aed">CLASSIFICATION</text>
  <g font-family="'SF Mono',monospace" font-size="10" fill="#475569">
    <circle cx="350" cy="98" r="3" fill="#8b5cf6"/><text x="360" y="102">classify_amp_tier</text>
    <circle cx="350" cy="116" r="3" fill="#8b5cf6"/><text x="360" y="120">score_oncogenicity</text>
    <circle cx="350" cy="134" r="3" fill="#8b5cf6"/><text x="360" y="138">variant_classify</text>
    <circle cx="350" cy="152" r="3" fill="#8b5cf6"/><text x="360" y="156">explain_acmg_criteria</text>
    <circle cx="350" cy="170" r="3" fill="#8b5cf6"/><text x="360" y="174">get_classification_frameworks_ref</text>
  </g>
  <rect x="560" y="192" width="38" height="14" rx="7" fill="#8b5cf6" fill-opacity="0.1"/>
  <text x="579" y="202" text-anchor="middle" font-family="'SF Mono',monospace" font-size="9" font-weight="600" fill="#8b5cf6">5</text>

  <!-- Annotation -->
  <rect x="640" y="58" width="300" height="190" rx="14" fill="#fff" stroke="#f59e0b" stroke-width="0.8" filter="url(#tSh)"/>
  <text x="790" y="80" text-anchor="middle" font-family="'SF Pro Display','Inter',sans-serif" font-size="12" font-weight="700" fill="#d97706">ANNOTATION</text>
  <g font-family="'SF Mono',monospace" font-size="10" fill="#475569">
    <circle cx="660" cy="98" r="3" fill="#f59e0b"/><text x="670" y="102">predict_variant_effect</text>
    <circle cx="660" cy="116" r="3" fill="#f59e0b"/><text x="670" y="120">lookup_gnomad_frequency</text>
    <circle cx="660" cy="134" r="3" fill="#f59e0b"/><text x="670" y="138">lookup_protein_domains</text>
    <circle cx="660" cy="152" r="3" fill="#f59e0b"/><text x="670" y="156">oncokb_annotate</text>
    <circle cx="660" cy="170" r="3" fill="#f59e0b"/><text x="670" y="174">oncokb_cancer_genes</text>
    <circle cx="660" cy="188" r="3" fill="#f59e0b"/><text x="670" y="192">normalize_variant</text>
  </g>
  <rect x="882" y="210" width="38" height="14" rx="7" fill="#f59e0b" fill-opacity="0.1"/>
  <text x="901" y="220" text-anchor="middle" font-family="'SF Mono',monospace" font-size="9" font-weight="600" fill="#d97706">6</text>

