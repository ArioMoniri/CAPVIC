  <rect x="25" y="65" width="270" height="185" rx="10" fill="#1e293b" stroke="#06b6d4" stroke-width="1" filter="url(#toShadow)"/>
  <text x="160" y="88" text-anchor="middle" font-family="'SF Pro Display',sans-serif" font-size="12" font-weight="700" letter-spacing="1" fill="#22d3ee">SEARCH &amp; DISCOVERY</text>
  <g font-family="'SF Mono',monospace" font-size="9.5" fill="#94a3b8">
    <circle cx="45" cy="108" r="3" fill="#06b6d4"/>
