    <circle cx="45" cy="313" r="3" fill="#22c55e"/>
    <text x="55" y="317">civic_get_gene</text>
    <circle cx="45" cy="331" r="3" fill="#22c55e"/>
    <text x="55" y="335">civic_get_variant</text>
    <circle cx="45" cy="349" r="3" fill="#22c55e"/>
