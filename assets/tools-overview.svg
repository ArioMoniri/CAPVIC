  <rect x="605" y="270" width="270" height="185" rx="10" fill="#1e293b" stroke="#475569" stroke-width="1" filter="url(#toShadow)"/>
  <text x="740" y="293" text-anchor="middle" font-family="'SF Pro Display',sans-serif" font-size="12" font-weight="700" letter-spacing="1" fill="#94a3b8">ALL TOOLS SUPPORT</text>
