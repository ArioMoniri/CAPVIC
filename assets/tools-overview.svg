  <rect x="20" y="268" width="220" height="160" rx="14" fill="#fff" stroke="#22c55e" stroke-width="0.8" filter="url(#tSh)"/>
  <text x="130" y="290" text-anchor="middle" font-family="'SF Pro Display','Inter',sans-serif" font-size="12" font-weight="700" fill="#16a34a">DATA RETRIEVAL</text>
  <g font-family="'SF Mono',monospace" font-size="10" fill="#475569">
    <circle cx="40" cy="308" r="3" fill="#22c55e"/><text x="50" y="312">civic_get_gene</text>
    <circle cx="40" cy="326" r="3" fill="#22c55e"/><text x="50" y="330">civic_get_variant</text>
    <circle cx="40" cy="344" r="3" fill="#22c55e"/><text x="50" y="348">civic_get_evidence_item</text>
    <circle cx="40" cy="362" r="3" fill="#22c55e"/><text x="50" y="366">clinvar_get_variant</text>
    <circle cx="40" cy="380" r="3" fill="#22c55e"/><text x="50" y="384">get_publication</text>
  </g>
  <rect x="182" y="396" width="38" height="14" rx="7" fill="#22c55e" fill-opacity="0.1"/>
  <text x="201" y="406" text-anchor="middle" font-family="'SF Mono',monospace" font-size="9" font-weight="600" fill="#16a34a">5</text>

