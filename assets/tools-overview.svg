  <text x="740" y="435" text-anchor="middle" font-family="'SF Mono',monospace" font-size="9" fill="#64748b">NLP disease/therapy normalization</text>
  <text x="740" y="448" text-anchor="middle" font-family="'SF Mono',monospace" font-size="9" fill="#64748b">35+ disease + 40+ therapy aliases</text>

  <!-- Footer -->
  <text x="450" y="472" text-anchor="middle" font-family="'SF Mono',monospace" font-size="9" fill="#475569">7 + 5 + 6 + 5 + 3 = 26 tools | All accessible via natural language prompts</text>
