<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <linearGradient id="dfBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a" />
      <stop offset="100%" style="stop-color:#1e293b" />
    </linearGradient>
    <marker id="arrowCyan" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#06b6d4"/>
    </marker>
    <marker id="arrowViolet" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8b5cf6"/>
    </marker>
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e"/>
    </marker>
    <filter id="dfShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="900" height="500" rx="12" fill="url(#dfBg)"/>
  <text x="450" y="35" text-anchor="middle" font-family="'SF Pro Display',sans-serif" font-size="18" font-weight="700" letter-spacing="3" fill="#e2e8f0">VARIANT CLASSIFICATION PIPELINE</text>
  <rect x="300" y="43" width="300" height="1.5" rx="1" fill="#8b5cf6" opacity="0.4"/>

  <!-- Step 1: Input -->
  <rect x="50" y="70" width="160" height="80" rx="10" fill="#06b6d4" fill-opacity="0.12" stroke="#06b6d4" stroke-width="1.2" filter="url(#dfShadow)"/>
  <text x="130" y="100" text-anchor="middle" font-family="'SF Pro Display',sans-serif" font-size="13" font-weight="700" fill="#06b6d4">1. INPUT</text>
  <text x="130" y="120" text-anchor="middle" font-family="'SF Mono',monospace" font-size="9" fill="#67e8f9">BRAF V600E</text>
  <text x="130" y="135" text-anchor="middle" font-family="'SF Mono',monospace" font-size="9" fill="#67e8f9">NLP Normalize</text>

  <!-- Step 2: Evidence Gather -->
  <rect x="260" y="70" width="160" height="80" rx="10" fill="#8b5cf6" fill-opacity="0.12" stroke="#8b5cf6" stroke-width="1.2" filter="url(#dfShadow)"/>
  <text x="340" y="100" text-anchor="middle" font-family="'SF Pro Display',sans-serif" font-size="13" font-weight="700" fill="#8b5cf6">2. GATHER</text>
  <text x="340" y="120" text-anchor="middle" font-family="'SF Mono',monospace" font-size="9" fill="#c4b5fd">CIViC + ClinVar</text>
  <text x="340" y="135" text-anchor="middle" font-family="'SF Mono',monospace" font-size="9" fill="#c4b5fd">OncoKB + MetaKB</text>

  <!-- Step 3: Annotate -->
  <rect x="470" y="70" width="160" height="80" rx="10" fill="#f59e0b" fill-opacity="0.12" stroke="#f59e0b" stroke-width="1.2" filter="url(#dfShadow)"/>
  <text x="550" y="100" text-anchor="middle" font-family="'SF Pro Display',sans-serif" font-size="13" font-weight="700" fill="#f59e0b">3. ANNOTATE</text>
  <text x="550" y="120" text-anchor="middle" font-family="'SF Mono',monospace" font-size="9" fill="#fcd34d">gnomAD AF + UniProt</text>
  <text x="550" y="135" text-anchor="middle" font-family="'SF Mono',monospace" font-size="9" fill="#fcd34d">SIFT/REVEL/CADD</text>

  <!-- Step 4: Classify -->
  <rect x="680" y="70" width="160" height="80" rx="10" fill="#22c55e" fill-opacity="0.12" stroke="#22c55e" stroke-width="1.2" filter="url(#dfShadow)"/>
  <text x="760" y="100" text-anchor="middle" font-family="'SF Pro Display',sans-serif" font-size="13" font-weight="700" fill="#22c55e">4. CLASSIFY</text>
  <text x="760" y="120" text-anchor="middle" font-family="'SF Mono',monospace" font-size="9" fill="#86efac">AMP Tier I-IV</text>
  <text x="760" y="135" text-anchor="middle" font-family="'SF Mono',monospace" font-size="9" fill="#86efac">Oncogenicity Score</text>

  <!-- Flow arrows -->
  <line x1="210" y1="110" x2="258" y2="110" stroke="#06b6d4" stroke-width="1.5" marker-end="url(#arrowCyan)"/>
  <line x1="420" y1="110" x2="468" y2="110" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arrowViolet)"/>
  <line x1="630" y1="110" x2="678" y2="110" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrowAmber)"/>

  <!-- Expanded detail boxes below -->

  <!-- Evidence sources detail -->
  <rect x="50" y="185" width="390" height="280" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1" filter="url(#dfShadow)"/>
  <text x="245" y="210" text-anchor="middle" font-family="'SF Pro Display',sans-serif" font-size="12" font-weight="600" letter-spacing="1" fill="#94a3b8">EVIDENCE BUNDLE</text>

  <!-- Evidence items -->
  <g font-family="'SF Mono',monospace" font-size="10">
    <rect x="70" y="225" width="350" height="28" rx="6" fill="#06b6d4" fill-opacity="0.08" stroke="#06b6d4" stroke-width="0.5"/>
    <circle cx="90" cy="239" r="4" fill="#06b6d4"/>
    <text x="105" y="243" fill="#67e8f9">CIViC Evidence</text>
    <text x="400" y="243" text-anchor="end" fill="#475569">Level A-E, Tier I-IV</text>

    <rect x="70" y="261" width="350" height="28" rx="6" fill="#22c55e" fill-opacity="0.08" stroke="#22c55e" stroke-width="0.5"/>
    <circle cx="90" cy="275" r="4" fill="#22c55e"/>
    <text x="105" y="279" fill="#86efac">ClinVar Classification</text>
    <text x="400" y="279" text-anchor="end" fill="#475569">Stars, Review Status</text>

    <rect x="70" y="297" width="350" height="28" rx="6" fill="#f59e0b" fill-opacity="0.08" stroke="#f59e0b" stroke-width="0.5"/>
    <circle cx="90" cy="311" r="4" fill="#f59e0b"/>
    <text x="105" y="315" fill="#fcd34d">OncoKB Annotation</text>
    <text x="400" y="315" text-anchor="end" fill="#475569">Oncogenic, Level 1-4</text>

    <rect x="70" y="333" width="350" height="28" rx="6" fill="#8b5cf6" fill-opacity="0.08" stroke="#8b5cf6" stroke-width="0.5"/>
    <circle cx="90" cy="347" r="4" fill="#8b5cf6"/>
    <text x="105" y="351" fill="#c4b5fd">gnomAD Frequency</text>
    <text x="400" y="351" text-anchor="end" fill="#475569">AF, BA1/PM2 Criteria</text>

    <rect x="70" y="369" width="350" height="28" rx="6" fill="#ec4899" fill-opacity="0.08" stroke="#ec4899" stroke-width="0.5"/>
    <circle cx="90" cy="383" r="4" fill="#ec4899"/>
    <text x="105" y="387" fill="#f9a8d4">In-silico Predictions</text>
    <text x="400" y="387" text-anchor="end" fill="#475569">PP3/BP4 Calibrated</text>

    <rect x="70" y="405" width="350" height="28" rx="6" fill="#14b8a6" fill-opacity="0.08" stroke="#14b8a6" stroke-width="0.5"/>
    <circle cx="90" cy="419" r="4" fill="#14b8a6"/>
    <text x="105" y="423" fill="#5eead4">Protein Domains</text>
    <text x="400" y="423" text-anchor="end" fill="#475569">UniProt, OM1 Hotspot</text>
  </g>

  <!-- Classification output -->
  <rect x="470" y="185" width="390" height="280" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1" filter="url(#dfShadow)"/>
  <text x="665" y="210" text-anchor="middle" font-family="'SF Pro Display',sans-serif" font-size="12" font-weight="600" letter-spacing="1" fill="#94a3b8">CLASSIFICATION OUTPUT</text>

  <g font-family="'SF Mono',monospace" font-size="10">
    <!-- AMP -->
    <rect x="490" y="225" width="350" height="55" rx="6" fill="#f59e0b" fill-opacity="0.08" stroke="#f59e0b" stroke-width="0.5"/>
    <text x="510" y="243" fill="#fbbf24" font-weight="700" font-size="11">AMP/ASCO/CAP</text>
    <text x="510" y="261" fill="#94a3b8">Tier I (Strong) ... Tier IV (Benign)</text>
    <text x="510" y="273" fill="#64748b" font-size="9">+ Evidence Level A-D</text>

    <!-- Oncogenicity -->
    <rect x="490" y="290" width="350" height="55" rx="6" fill="#8b5cf6" fill-opacity="0.08" stroke="#8b5cf6" stroke-width="0.5"/>
    <text x="510" y="308" fill="#c4b5fd" font-weight="700" font-size="11">ClinGen Oncogenicity SOP</text>
    <text x="510" y="326" fill="#94a3b8">Oncogenic ... Benign (point-based)</text>
    <text x="510" y="338" fill="#64748b" font-size="9">18 evidence codes, Horak 2022</text>

    <!-- ACMG -->
    <rect x="490" y="355" width="350" height="55" rx="6" fill="#22c55e" fill-opacity="0.08" stroke="#22c55e" stroke-width="0.5"/>
    <text x="510" y="373" fill="#86efac" font-weight="700" font-size="11">ACMG/AMP 5-Tier</text>
    <text x="510" y="391" fill="#94a3b8">Pathogenic ... Benign</text>
    <text x="510" y="403" fill="#64748b" font-size="9">Richards 2015, PP3/BP4 calibrated</text>

    <!-- Output formats -->
    <rect x="490" y="420" width="350" height="38" rx="6" fill="#06b6d4" fill-opacity="0.08" stroke="#06b6d4" stroke-width="0.5"/>
    <text x="510" y="438" fill="#67e8f9" font-weight="700" font-size="11">Output Formats</text>
    <text x="510" y="452" fill="#94a3b8">Markdown | JSON | Plain Text</text>
  </g>

  <!-- Connecting arrow -->
  <line x1="440" y1="325" x2="468" y2="325" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- Footer -->
  <text x="450" y="490" text-anchor="middle" font-family="'SF Mono',monospace" font-size="9" fill="#475569">CAPVIC v1.0.5 | Vivax Teknoloji A.S.</text>
</svg>
