  <rect x="60" y="72" width="880" height="64" rx="14" fill="#fff" stroke="#e2e8f0" stroke-width="1" filter="url(#aSh)"/>
  <text x="500" y="92" text-anchor="middle" font-family="'SF Pro Text','Inter',sans-serif" font-size="10" font-weight="600" letter-spacing="1.5" fill="#94a3b8">AI CLIENT LAYER</text>
  <g font-family="'SF Pro Text','Inter',sans-serif" font-size="12" font-weight="600">
