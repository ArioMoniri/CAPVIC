    <rect x="710" y="510" width="195" height="44" rx="10" fill="#ef4444" fill-opacity="0.06" stroke="#ef4444" stroke-width="0.7"/>
    <text x="807" y="530" text-anchor="middle" font-size="13" font-weight="700" fill="#dc2626">VICC MetaKB</text>
    <text x="807" y="545" text-anchor="middle" font-family="'SF Mono',monospace" font-size="8.5" fill="#94a3b8">Harmonized | 6 KBs</text>

    <!-- Row 2 -->
    <rect x="65" y="564" width="195" height="44" rx="10" fill="#8b5cf6" fill-opacity="0.06" stroke="#8b5cf6" stroke-width="0.7"/>
    <text x="162" y="584" text-anchor="middle" font-size="13" font-weight="700" fill="#7c3aed">gnomAD</text>
    <text x="162" y="599" text-anchor="middle" font-family="'SF Mono',monospace" font-size="8.5" fill="#94a3b8">GraphQL v4 | GRCh37/38</text>

    <rect x="280" y="564" width="195" height="44" rx="10" fill="#14b8a6" fill-opacity="0.06" stroke="#14b8a6" stroke-width="0.7"/>
    <text x="377" y="584" text-anchor="middle" font-size="13" font-weight="700" fill="#0d9488">UniProt</text>
    <text x="377" y="599" text-anchor="middle" font-family="'SF Mono',monospace" font-size="8.5" fill="#94a3b8">REST | Protein Domains</text>

    <rect x="495" y="564" width="195" height="44" rx="10" fill="#ec4899" fill-opacity="0.06" stroke="#ec4899" stroke-width="0.7"/>
    <text x="592" y="584" text-anchor="middle" font-size="13" font-weight="700" fill="#db2777">PubMed</text>
    <text x="592" y="599" text-anchor="middle" font-family="'SF Mono',monospace" font-size="8.5" fill="#94a3b8">E-utilities | Literature</text>

    <rect x="710" y="564" width="195" height="44" rx="10" fill="#f97316" fill-opacity="0.06" stroke="#f97316" stroke-width="0.7"/>
    <text x="807" y="584" text-anchor="middle" font-size="13" font-weight="700" fill="#ea580c">MyVariant.info</text>
    <text x="807" y="599" text-anchor="middle" font-family="'SF Mono',monospace" font-size="8.5" fill="#94a3b8">REST | SIFT/REVEL/CADD</text>
