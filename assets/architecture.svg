    <rect x="352" y="102" width="82" height="24" rx="12" fill="#0ea5e9" fill-opacity="0.08" stroke="#0ea5e9" stroke-width="0.7"/>
    <text x="393" y="118" text-anchor="middle" fill="#0ea5e9">Gemini</text>
    <rect x="446" y="102" width="98" height="24" rx="12" fill="#f59e0b" fill-opacity="0.08" stroke="#f59e0b" stroke-width="0.7"/>
    <text x="495" y="118" text-anchor="middle" fill="#d97706">OpenCode</text>
