<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 400" width="1000" height="400">
  <defs>
    <filter id="cSh">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#94a3b8" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1000" height="400" rx="16" fill="#f8fafc"/>
  <text x="500" y="35" text-anchor="middle" font-family="'SF Pro Display','Inter',sans-serif" font-size="18" font-weight="800" letter-spacing="1" fill="#0f172a">Classification Frameworks</text>
  <rect x="350" y="43" width="300" height="2" rx="1" fill="#0ea5e9" opacity="0.25"/>

  <!-- AMP/ASCO/CAP -->
  <rect x="20" y="62" width="310" height="315" rx="14" fill="#fff" stroke="#f59e0b" stroke-width="1" filter="url(#cSh)"/>
  <text x="175" y="90" text-anchor="middle" font-family="'SF Pro Display','Inter',sans-serif" font-size="14" font-weight="800" fill="#d97706">AMP/ASCO/CAP</text>
  <text x="175" y="106" text-anchor="middle" font-family="'SF Mono',monospace" font-size="10" fill="#94a3b8">Somatic 4-Tier | Li et al. 2017</text>

  <g font-family="'SF Pro Display','Inter',sans-serif">
    <rect x="40" y="120" width="270" height="38" rx="8" fill="#ef4444" fill-opacity="0.06" stroke="#ef4444" stroke-width="0.7"/>
    <circle cx="58" cy="139" r="9" fill="#ef4444"/><text x="58" y="143" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">I</text>
    <text x="78" y="135" font-size="11" font-weight="600" fill="#dc2626">Strong Clinical Significance</text>
    <text x="78" y="150" font-family="'SF Mono',monospace" font-size="8.5" fill="#94a3b8">FDA-approved, Guidelines (A/B)</text>

    <rect x="40" y="164" width="270" height="38" rx="8" fill="#f97316" fill-opacity="0.06" stroke="#f97316" stroke-width="0.7"/>
    <circle cx="58" cy="183" r="9" fill="#f97316"/><text x="58" y="187" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">II</text>
    <text x="78" y="179" font-size="11" font-weight="600" fill="#ea580c">Potential Clinical Significance</text>
    <text x="78" y="194" font-family="'SF Mono',monospace" font-size="8.5" fill="#94a3b8">Off-label, Preclinical (C/D)</text>

    <rect x="40" y="208" width="270" height="38" rx="8" fill="#eab308" fill-opacity="0.06" stroke="#eab308" stroke-width="0.7"/>
    <circle cx="58" cy="227" r="9" fill="#eab308"/><text x="58" y="231" text-anchor="middle" font-size="9" font-weight="700" fill="#422006">III</text>
    <text x="78" y="223" font-size="11" font-weight="600" fill="#a16207">Unknown Significance</text>
    <text x="78" y="238" font-family="'SF Mono',monospace" font-size="8.5" fill="#94a3b8">No published evidence</text>

    <rect x="40" y="252" width="270" height="38" rx="8" fill="#22c55e" fill-opacity="0.06" stroke="#22c55e" stroke-width="0.7"/>
    <circle cx="58" cy="271" r="9" fill="#22c55e"/><text x="58" y="275" text-anchor="middle" font-size="9" font-weight="700" fill="#052e16">IV</text>
    <text x="78" y="267" font-size="11" font-weight="600" fill="#16a34a">Benign / Likely Benign</text>
    <text x="78" y="282" font-family="'SF Mono',monospace" font-size="8.5" fill="#94a3b8">High population frequency</text>
  </g>
  <rect x="40" y="302" width="270" height="28" rx="14" fill="#f59e0b" fill-opacity="0.06" stroke="#f59e0b" stroke-width="0.6" stroke-dasharray="5,3"/>
  <text x="175" y="320" text-anchor="middle" font-family="'SF Mono',monospace" font-size="10" fill="#d97706">classify_amp_tier</text>

  <!-- ClinGen Oncogenicity -->
  <rect x="345" y="62" width="310" height="315" rx="14" fill="#fff" stroke="#8b5cf6" stroke-width="1" filter="url(#cSh)"/>
  <text x="500" y="90" text-anchor="middle" font-family="'SF Pro Display','Inter',sans-serif" font-size="14" font-weight="800" fill="#7c3aed">ClinGen Oncogenicity SOP</text>
  <text x="500" y="106" text-anchor="middle" font-family="'SF Mono',monospace" font-size="10" fill="#94a3b8">18 Codes | Horak et al. 2022</text>

  <g font-family="'SF Pro Display','Inter',sans-serif">
    <rect x="365" y="120" width="270" height="32" rx="8" fill="#ef4444" fill-opacity="0.06" stroke="#ef4444" stroke-width="0.7"/>
    <text x="385" y="140" font-size="11" font-weight="600" fill="#dc2626">Oncogenic</text>
    <text x="615" y="140" text-anchor="end" font-family="'SF Mono',monospace" font-size="10" fill="#ef4444">≥ 10 pts</text>

    <rect x="365" y="158" width="270" height="32" rx="8" fill="#f97316" fill-opacity="0.06" stroke="#f97316" stroke-width="0.7"/>
    <text x="385" y="178" font-size="11" font-weight="600" fill="#ea580c">Likely Oncogenic</text>
    <text x="615" y="178" text-anchor="end" font-family="'SF Mono',monospace" font-size="10" fill="#f97316">6 – 9 pts</text>

    <rect x="365" y="196" width="270" height="32" rx="8" fill="#eab308" fill-opacity="0.06" stroke="#eab308" stroke-width="0.7"/>
    <text x="385" y="216" font-size="11" font-weight="600" fill="#a16207">VUS</text>
    <text x="615" y="216" text-anchor="end" font-family="'SF Mono',monospace" font-size="10" fill="#eab308">-5 to +5</text>

    <rect x="365" y="234" width="270" height="32" rx="8" fill="#3b82f6" fill-opacity="0.06" stroke="#3b82f6" stroke-width="0.7"/>
    <text x="385" y="254" font-size="11" font-weight="600" fill="#2563eb">Likely Benign</text>
    <text x="615" y="254" text-anchor="end" font-family="'SF Mono',monospace" font-size="10" fill="#3b82f6">-6 to -9</text>

    <rect x="365" y="272" width="270" height="32" rx="8" fill="#22c55e" fill-opacity="0.06" stroke="#22c55e" stroke-width="0.7"/>
    <text x="385" y="292" font-size="11" font-weight="600" fill="#16a34a">Benign</text>
    <text x="615" y="292" text-anchor="end" font-family="'SF Mono',monospace" font-size="10" fill="#22c55e">≤ -10 pts</text>
  </g>
  <rect x="365" y="316" width="270" height="28" rx="14" fill="#8b5cf6" fill-opacity="0.06" stroke="#8b5cf6" stroke-width="0.6" stroke-dasharray="5,3"/>
  <text x="500" y="334" text-anchor="middle" font-family="'SF Mono',monospace" font-size="10" fill="#7c3aed">score_oncogenicity</text>

  <!-- ACMG/AMP -->
  <rect x="670" y="62" width="310" height="315" rx="14" fill="#fff" stroke="#22c55e" stroke-width="1" filter="url(#cSh)"/>
  <text x="825" y="90" text-anchor="middle" font-family="'SF Pro Display','Inter',sans-serif" font-size="14" font-weight="800" fill="#16a34a">ACMG/AMP</text>
  <text x="825" y="106" text-anchor="middle" font-family="'SF Mono',monospace" font-size="10" fill="#94a3b8">Germline 5-Tier | Richards 2015</text>

  <g font-family="'SF Pro Display','Inter',sans-serif">
    <rect x="690" y="120" width="270" height="30" rx="8" fill="#ef4444" fill-opacity="0.06" stroke="#ef4444" stroke-width="0.7"/>
    <text x="710" y="139" font-size="11" font-weight="600" fill="#dc2626">Pathogenic</text>
    <text x="940" y="139" text-anchor="end" font-family="'SF Mono',monospace" font-size="9" fill="#94a3b8">PVS1 + Strong</text>

    <rect x="690" y="156" width="270" height="30" rx="8" fill="#f97316" fill-opacity="0.06" stroke="#f97316" stroke-width="0.7"/>
    <text x="710" y="175" font-size="11" font-weight="600" fill="#ea580c">Likely Pathogenic</text>
    <text x="940" y="175" text-anchor="end" font-family="'SF Mono',monospace" font-size="9" fill="#94a3b8">Strong + Moderate</text>

    <rect x="690" y="192" width="270" height="30" rx="8" fill="#eab308" fill-opacity="0.06" stroke="#eab308" stroke-width="0.7"/>
    <text x="710" y="211" font-size="11" font-weight="600" fill="#a16207">VUS</text>
    <text x="940" y="211" text-anchor="end" font-family="'SF Mono',monospace" font-size="9" fill="#94a3b8">Criteria not met</text>

    <rect x="690" y="228" width="270" height="30" rx="8" fill="#3b82f6" fill-opacity="0.06" stroke="#3b82f6" stroke-width="0.7"/>
    <text x="710" y="247" font-size="11" font-weight="600" fill="#2563eb">Likely Benign</text>
    <text x="940" y="247" text-anchor="end" font-family="'SF Mono',monospace" font-size="9" fill="#94a3b8">BS + BP</text>

    <rect x="690" y="264" width="270" height="30" rx="8" fill="#22c55e" fill-opacity="0.06" stroke="#22c55e" stroke-width="0.7"/>
    <text x="710" y="283" font-size="11" font-weight="600" fill="#16a34a">Benign</text>
    <text x="940" y="283" text-anchor="end" font-family="'SF Mono',monospace" font-size="9" fill="#94a3b8">BA1 standalone</text>
  </g>
  <rect x="690" y="306" width="270" height="28" rx="14" fill="#22c55e" fill-opacity="0.06" stroke="#22c55e" stroke-width="0.6" stroke-dasharray="5,3"/>
  <text x="825" y="324" text-anchor="middle" font-family="'SF Mono',monospace" font-size="10" fill="#16a34a">explain_acmg_criteria</text>

  <!-- Footer -->
  <text x="500" y="393" text-anchor="middle" font-family="'SF Mono',monospace" font-size="9" fill="#94a3b8">All frameworks accessible via natural language | output_format: markdown | json | text</text>
</svg>
