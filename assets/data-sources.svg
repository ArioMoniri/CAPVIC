<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" width="960" height="420">
  <defs>
    <filter id="dSh">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#94a3b8" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="960" height="420" rx="16" fill="#f8fafc"/>
  <text x="480" y="32" text-anchor="middle" font-family="'SF Pro Display','Inter',sans-serif" font-size="18" font-weight="800" letter-spacing="1" fill="#0f172a">10 Integrated Data Sources</text>
  <rect x="380" y="40" width="200" height="2" rx="1" fill="#0ea5e9" opacity="0.25"/>

  <!-- Row 1: 5 sources -->
  <g font-family="'SF Pro Display','Inter',sans-serif">
    <!-- CIViC -->
    <rect x="20" y="60" width="178" height="120" rx="12" fill="#fff" stroke="#0ea5e9" stroke-width="0.8" filter="url(#dSh)"/>
    <text x="109" y="88" text-anchor="middle" font-size="15" font-weight="800" fill="#0ea5e9">CIViC</text>
    <text x="109" y="106" text-anchor="middle" font-family="'SF Mono',monospace" font-size="9" fill="#64748b">GraphQL v2</text>
    <text x="109" y="122" text-anchor="middle" font-family="'SF Mono',monospace" font-size="8.5" fill="#94a3b8">Expert-curated clinical</text>
    <text x="109" y="136" text-anchor="middle" font-family="'SF Mono',monospace" font-size="8.5" fill="#94a3b8">evidence + assertions</text>
    <rect x="60" y="150" width="98" height="16" rx="8" fill="#0ea5e9" fill-opacity="0.08"/>
    <text x="109" y="162" text-anchor="middle" font-family="'SF Mono',monospace" font-size="8" fill="#0ea5e9">Free, no auth</text>

    <!-- ClinVar -->
    <rect x="210" y="60" width="178" height="120" rx="12" fill="#fff" stroke="#22c55e" stroke-width="0.8" filter="url(#dSh)"/>
    <text x="299" y="88" text-anchor="middle" font-size="15" font-weight="800" fill="#16a34a">ClinVar</text>
    <text x="299" y="106" text-anchor="middle" font-family="'SF Mono',monospace" font-size="9" fill="#64748b">E-utilities / VCV XML</text>
    <text x="299" y="122" text-anchor="middle" font-family="'SF Mono',monospace" font-size="8.5" fill="#94a3b8">Aggregate pathogenicity</text>
    <text x="299" y="136" text-anchor="middle" font-family="'SF Mono',monospace" font-size="8.5" fill="#94a3b8">from 2,000+ labs</text>
    <rect x="250" y="150" width="98" height="16" rx="8" fill="#22c55e" fill-opacity="0.08"/>
    <text x="299" y="162" text-anchor="middle" font-family="'SF Mono',monospace" font-size="8" fill="#16a34a">Free, no auth</text>

    <!-- OncoKB -->
    <rect x="400" y="60" width="178" height="120" rx="12" fill="#fff" stroke="#f59e0b" stroke-width="0.8" filter="url(#dSh)"/>
    <text x="489" y="88" text-anchor="middle" font-size="15" font-weight="800" fill="#d97706">OncoKB</text>
    <text x="489" y="106" text-anchor="middle" font-family="'SF Mono',monospace" font-size="9" fill="#64748b">REST API</text>
    <text x="489" y="122" text-anchor="middle" font-family="'SF Mono',monospace" font-size="8.5" fill="#94a3b8">FDA-recognized precision</text>
    <text x="489" y="136" text-anchor="middle" font-family="'SF Mono',monospace" font-size="8.5" fill="#94a3b8">oncology knowledge base</text>
    <rect x="440" y="150" width="98" height="16" rx="8" fill="#f59e0b" fill-opacity="0.08"/>
    <text x="489" y="162" text-anchor="middle" font-family="'SF Mono',monospace" font-size="8" fill="#d97706">Free academic token</text>

    <!-- MetaKB -->
    <rect x="590" y="60" width="178" height="120" rx="12" fill="#fff" stroke="#ef4444" stroke-width="0.8" filter="url(#dSh)"/>
    <text x="679" y="88" text-anchor="middle" font-size="15" font-weight="800" fill="#dc2626">VICC MetaKB</text>
    <text x="679" y="106" text-anchor="middle" font-family="'SF Mono',monospace" font-size="9" fill="#64748b">Harmonized API</text>
    <text x="679" y="122" text-anchor="middle" font-family="'SF Mono',monospace" font-size="8.5" fill="#94a3b8">Aggregated from 6</text>
    <text x="679" y="136" text-anchor="middle" font-family="'SF Mono',monospace" font-size="8.5" fill="#94a3b8">knowledgebases</text>
    <rect x="630" y="150" width="98" height="16" rx="8" fill="#ef4444" fill-opacity="0.08"/>
    <text x="679" y="162" text-anchor="middle" font-family="'SF Mono',monospace" font-size="8" fill="#dc2626">Free, no auth</text>

    <!-- gnomAD -->
    <rect x="780" y="60" width="162" height="120" rx="12" fill="#fff" stroke="#8b5cf6" stroke-width="0.8" filter="url(#dSh)"/>
    <text x="861" y="88" text-anchor="middle" font-size="15" font-weight="800" fill="#7c3aed">gnomAD</text>
    <text x="861" y="106" text-anchor="middle" font-family="'SF Mono',monospace" font-size="9" fill="#64748b">GraphQL v4</text>
    <text x="861" y="122" text-anchor="middle" font-family="'SF Mono',monospace" font-size="8.5" fill="#94a3b8">76K genomes, 807K</text>
    <text x="861" y="136" text-anchor="middle" font-family="'SF Mono',monospace" font-size="8.5" fill="#94a3b8">exomes, GRCh37/38</text>
    <rect x="812" y="150" width="98" height="16" rx="8" fill="#8b5cf6" fill-opacity="0.08"/>
    <text x="861" y="162" text-anchor="middle" font-family="'SF Mono',monospace" font-size="8" fill="#7c3aed">Free, no auth</text>
  </g>

  <!-- Row 2: 5 sources -->
  <g font-family="'SF Pro Display','Inter',sans-serif">
    <!-- UniProt -->
    <rect x="20" y="200" width="178" height="120" rx="12" fill="#fff" stroke="#14b8a6" stroke-width="0.8" filter="url(#dSh)"/>
    <text x="109" y="228" text-anchor="middle" font-size="15" font-weight="800" fill="#0d9488">UniProt</text>
    <text x="109" y="246" text-anchor="middle" font-family="'SF Mono',monospace" font-size="9" fill="#64748b">REST API</text>
    <text x="109" y="262" text-anchor="middle" font-family="'SF Mono',monospace" font-size="8.5" fill="#94a3b8">Protein domains and</text>
    <text x="109" y="276" text-anchor="middle" font-family="'SF Mono',monospace" font-size="8.5" fill="#94a3b8">functional annotation</text>
    <rect x="60" y="290" width="98" height="16" rx="8" fill="#14b8a6" fill-opacity="0.08"/>
    <text x="109" y="302" text-anchor="middle" font-family="'SF Mono',monospace" font-size="8" fill="#0d9488">Free, no auth</text>

    <!-- PubMed -->
    <rect x="210" y="200" width="178" height="120" rx="12" fill="#fff" stroke="#ec4899" stroke-width="0.8" filter="url(#dSh)"/>
    <text x="299" y="228" text-anchor="middle" font-size="15" font-weight="800" fill="#db2777">PubMed</text>
    <text x="299" y="246" text-anchor="middle" font-family="'SF Mono',monospace" font-size="9" fill="#64748b">E-utilities</text>
    <text x="299" y="262" text-anchor="middle" font-family="'SF Mono',monospace" font-size="8.5" fill="#94a3b8">36M+ biomedical</text>
    <text x="299" y="276" text-anchor="middle" font-family="'SF Mono',monospace" font-size="8.5" fill="#94a3b8">articles, co-occurrence</text>
    <rect x="250" y="290" width="98" height="16" rx="8" fill="#ec4899" fill-opacity="0.08"/>
    <text x="299" y="302" text-anchor="middle" font-family="'SF Mono',monospace" font-size="8" fill="#db2777">Free, no auth</text>

    <!-- MyVariant.info -->
    <rect x="400" y="200" width="178" height="120" rx="12" fill="#fff" stroke="#f97316" stroke-width="0.8" filter="url(#dSh)"/>
    <text x="489" y="228" text-anchor="middle" font-size="15" font-weight="800" fill="#ea580c">MyVariant.info</text>
    <text x="489" y="246" text-anchor="middle" font-family="'SF Mono',monospace" font-size="9" fill="#64748b">REST API</text>
    <text x="489" y="262" text-anchor="middle" font-family="'SF Mono',monospace" font-size="8.5" fill="#94a3b8">SIFT, PolyPhen-2, REVEL</text>
    <text x="489" y="276" text-anchor="middle" font-family="'SF Mono',monospace" font-size="8.5" fill="#94a3b8">CADD, AlphaMissense</text>
    <rect x="440" y="290" width="98" height="16" rx="8" fill="#f97316" fill-opacity="0.08"/>
    <text x="489" y="302" text-anchor="middle" font-family="'SF Mono',monospace" font-size="8" fill="#ea580c">Free, no auth</text>

    <!-- Cancer Hotspots -->
    <rect x="590" y="200" width="178" height="120" rx="12" fill="#fff" stroke="#dc2626" stroke-width="0.8" filter="url(#dSh)"/>
    <text x="679" y="224" text-anchor="middle" font-size="14" font-weight="800" fill="#dc2626">Cancer</text>
    <text x="679" y="240" text-anchor="middle" font-size="14" font-weight="800" fill="#dc2626">Hotspots</text>
    <text x="679" y="258" text-anchor="middle" font-family="'SF Mono',monospace" font-size="9" fill="#64748b">POST API</text>
    <text x="679" y="274" text-anchor="middle" font-family="'SF Mono',monospace" font-size="8.5" fill="#94a3b8">Recurrent somatic</text>
    <text x="679" y="288" text-anchor="middle" font-family="'SF Mono',monospace" font-size="8.5" fill="#94a3b8">hotspots, q-values</text>
    <rect x="630" y="298" width="98" height="16" rx="8" fill="#dc2626" fill-opacity="0.08"/>
    <text x="679" y="310" text-anchor="middle" font-family="'SF Mono',monospace" font-size="8" fill="#dc2626">Free, no auth</text>

    <!-- LitVar2 -->
    <rect x="780" y="200" width="162" height="120" rx="12" fill="#fff" stroke="#6366f1" stroke-width="0.8" filter="url(#dSh)"/>
    <text x="861" y="228" text-anchor="middle" font-size="15" font-weight="800" fill="#4f46e5">LitVar2</text>
    <text x="861" y="246" text-anchor="middle" font-family="'SF Mono',monospace" font-size="9" fill="#64748b">REST + v1 Entity</text>
    <text x="861" y="262" text-anchor="middle" font-family="'SF Mono',monospace" font-size="8.5" fill="#94a3b8">NLP text-mined 20M+</text>
    <text x="861" y="276" text-anchor="middle" font-family="'SF Mono',monospace" font-size="8.5" fill="#94a3b8">variant-pub links</text>
    <rect x="812" y="290" width="98" height="16" rx="8" fill="#6366f1" fill-opacity="0.08"/>
    <text x="861" y="302" text-anchor="middle" font-family="'SF Mono',monospace" font-size="8" fill="#4f46e5">Free, no auth</text>
  </g>

  <!-- Framework badges -->
  <g font-family="'SF Mono',monospace" font-size="9">
    <rect x="80" y="345" width="150" height="24" rx="12" fill="#f59e0b" fill-opacity="0.08" stroke="#f59e0b" stroke-width="0.5"/>
    <text x="155" y="361" text-anchor="middle" fill="#d97706" font-weight="600">AMP/ASCO/CAP</text>

    <rect x="250" y="345" width="170" height="24" rx="12" fill="#8b5cf6" fill-opacity="0.08" stroke="#8b5cf6" stroke-width="0.5"/>
    <text x="335" y="361" text-anchor="middle" fill="#7c3aed" font-weight="600">Oncogenicity SOP</text>

    <rect x="440" y="345" width="120" height="24" rx="12" fill="#22c55e" fill-opacity="0.08" stroke="#22c55e" stroke-width="0.5"/>
    <text x="500" y="361" text-anchor="middle" fill="#16a34a" font-weight="600">ACMG/AMP</text>

    <rect x="580" y="345" width="220" height="24" rx="12" fill="#dc2626" fill-opacity="0.08" stroke="#dc2626" stroke-width="0.5"/>
    <text x="690" y="361" text-anchor="middle" fill="#dc2626" font-weight="600">Driver Mutation Cross-Reference</text>
  </g>

  <!-- Footer -->
  <text x="480" y="400" text-anchor="middle" font-family="'SF Mono',monospace" font-size="9" fill="#94a3b8">CAPVIC v1.0.6 — 10 data sources | 29 tools | 4 classification frameworks</text>
  <text x="480" y="414" text-anchor="middle" font-family="'SF Mono',monospace" font-size="8.5" fill="#cbd5e1">Vivax Teknoloji A.S.</text>
</svg>
