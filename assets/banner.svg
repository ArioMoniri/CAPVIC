<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" width="1200" height="340">
  <defs>
    <linearGradient id="banBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#f1f5f9"/>
    </linearGradient>
    <linearGradient id="banDna" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a3a6b"/>
      <stop offset="45%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#22d3ee"/>
    </linearGradient>
    <linearGradient id="banAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="banVivax" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a3a6b"/>
      <stop offset="50%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#22d3ee"/>
    </linearGradient>
    <linearGradient id="banLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:0"/>
      <stop offset="20%" style="stop-color:#0ea5e9;stop-opacity:0.4"/>
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:0.4"/>
      <stop offset="80%" style="stop-color:#0ea5e9;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:0"/>
    </linearGradient>
    <clipPath id="banClip">
      <circle cx="100" cy="135" r="52"/>
    </clipPath>
  </defs>

  <!-- Clean light background -->
  <rect width="1200" height="340" rx="16" fill="url(#banBg)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#0ea5e9" stroke-width="0.5">
    <line x1="0" y1="68" x2="1200" y2="68"/><line x1="0" y1="136" x2="1200" y2="136"/>
    <line x1="0" y1="204" x2="1200" y2="204"/><line x1="0" y1="272" x2="1200" y2="272"/>
  </g>

  <!-- Logo mark (left) — actual Vivax logo -->
  <image href="vivax%20main%20logo.png" x="48" y="83" width="104" height="104"/>

  <!-- Title -->
  <text x="180" y="115" font-family="'SF Pro Display','Inter','Helvetica Neue',sans-serif" font-size="54" font-weight="800" letter-spacing="-1" fill="#0f172a">CAPVIC</text>

  <!-- Accent line -->
  <rect x="180" y="130" width="320" height="2" rx="1" fill="url(#banLine)"/>

  <!-- Subtitle -->
  <text x="180" y="158" font-family="'SF Pro Display','Inter',sans-serif" font-size="14" font-weight="500" letter-spacing="2" fill="#64748b">CLINICAL &amp; ACADEMIC PRECISION VARIANT</text>
  <text x="180" y="178" font-family="'SF Pro Display','Inter',sans-serif" font-size="14" font-weight="500" letter-spacing="2" fill="#64748b">INTERPRETATION CONSOLE</text>

  <!-- Feature pills -->
  <g font-family="'SF Pro Text','Inter',sans-serif" font-size="11" font-weight="600">
    <rect x="180" y="200" width="88" height="28" rx="14" fill="#0ea5e9" fill-opacity="0.1" stroke="#0ea5e9" stroke-width="0.8"/>
    <text x="224" y="218" text-anchor="middle" fill="#0ea5e9">8 Sources</text>

    <rect x="280" y="200" width="82" height="28" rx="14" fill="#8b5cf6" fill-opacity="0.1" stroke="#8b5cf6" stroke-width="0.8"/>
    <text x="321" y="218" text-anchor="middle" fill="#8b5cf6">26 Tools</text>

    <rect x="374" y="200" width="116" height="28" rx="14" fill="#f59e0b" fill-opacity="0.1" stroke="#f59e0b" stroke-width="0.8"/>
    <text x="432" y="218" text-anchor="middle" fill="#d97706">3 Frameworks</text>

    <rect x="502" y="200" width="128" height="28" rx="14" fill="#22c55e" fill-opacity="0.1" stroke="#22c55e" stroke-width="0.8"/>
    <text x="566" y="218" text-anchor="middle" fill="#16a34a">MCP Compatible</text>
  </g>

  <!-- Vivax branding (bottom-left, with cross logo) -->
  <g transform="translate(180, 258)">
    <text x="0" y="12" font-family="'SF Pro Display','Inter',sans-serif" font-size="10" font-weight="400" letter-spacing="1.5" fill="#94a3b8">A PRODUCT OF</text>
    <!-- Vivax logo -->
    <image href="vivax%20main%20logo.png" x="80" y="-6" width="26" height="26"/>
    <text x="114" y="14" font-family="'SF Pro Display','Inter',sans-serif" font-size="14" font-weight="700" letter-spacing="1" fill="#0f172a">Vivax</text>
    <text x="163" y="14" font-family="'SF Pro Display','Inter',sans-serif" font-size="14" font-weight="400" fill="#64748b">Teknoloji</text>
  </g>

  <!-- Right side: abstract data visualization -->
  <g opacity="0.08">
    <circle cx="850" cy="100" r="120" fill="none" stroke="#0ea5e9" stroke-width="0.8"/>
    <circle cx="850" cy="100" r="80" fill="none" stroke="#8b5cf6" stroke-width="0.8"/>
    <circle cx="850" cy="100" r="40" fill="none" stroke="#0ea5e9" stroke-width="0.8"/>
    <circle cx="1000" cy="200" r="100" fill="none" stroke="#8b5cf6" stroke-width="0.8"/>
    <circle cx="1000" cy="200" r="60" fill="none" stroke="#0ea5e9" stroke-width="0.8"/>
    <circle cx="920" cy="250" r="70" fill="none" stroke="#06b6d4" stroke-width="0.8"/>
  </g>
  <!-- Data nodes -->
  <g opacity="0.25">
    <circle cx="770" cy="60" r="4" fill="#0ea5e9"/>
    <circle cx="930" cy="60" r="3" fill="#8b5cf6"/>
    <circle cx="850" cy="180" r="5" fill="#06b6d4"/>
    <circle cx="1000" cy="100" r="3" fill="#f59e0b"/>
    <circle cx="770" cy="180" r="4" fill="#22c55e"/>
    <circle cx="1060" cy="200" r="3" fill="#ec4899"/>
    <circle cx="920" cy="320" r="4" fill="#14b8a6"/>
    <circle cx="1100" cy="130" r="3" fill="#f97316"/>
  </g>

  <!-- Vivax badge (bottom-right) -->
  <g transform="translate(850, 275)">
    <rect x="0" y="0" width="160" height="40" rx="20" fill="#0f172a" fill-opacity="0.05" stroke="#cbd5e1" stroke-width="0.8"/>
    <!-- Vivax logo -->
    <image href="vivax%20main%20logo.png" x="8" y="6" width="28" height="28"/>
    <text x="42" y="24" font-family="'SF Pro Display','Inter',sans-serif" font-size="12" font-weight="700" fill="#0f172a">Vivax</text>
    <text x="92" y="24" font-family="'SF Mono',monospace" font-size="9" font-weight="500" fill="#8b5cf6">MCP</text>
  </g>
</svg>
