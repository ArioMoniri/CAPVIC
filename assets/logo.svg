<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="helixGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="helixGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ef4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.8" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="250" fill="url(#bgGrad)" stroke="url(#ringGrad)" stroke-width="3"/>

  <!-- Outer orbital ring -->
  <ellipse cx="256" cy="256" rx="200" ry="200" fill="none" stroke="url(#ringGrad)" stroke-width="1.5" stroke-dasharray="8,6" opacity="0.3"/>

  <!-- DNA Double Helix (stylized, vertical) -->
  <g filter="url(#glow)" transform="translate(256,256)">
    <!-- Left strand -->
    <path d="M-40,-140 C-40,-100 40,-80 40,-40 C40,0 -40,20 -40,60 C-40,100 40,120 40,140"
          fill="none" stroke="url(#helixGrad1)" stroke-width="5" stroke-linecap="round"/>
    <!-- Right strand -->
    <path d="M40,-140 C40,-100 -40,-80 -40,-40 C-40,0 40,20 40,60 C40,100 -40,120 -40,140"
          fill="none" stroke="url(#helixGrad2)" stroke-width="5" stroke-linecap="round"/>

    <!-- Base pairs (rungs) -->
    <line x1="-20" y1="-130" x2="20" y2="-130" stroke="#06b6d4" stroke-width="2.5" opacity="0.7" stroke-linecap="round"/>
    <line x1="-35" y1="-105" x2="35" y2="-105" stroke="#8b5cf6" stroke-width="2.5" opacity="0.7" stroke-linecap="round"/>
    <line x1="-38" y1="-80" x2="38" y2="-80" stroke="#06b6d4" stroke-width="2.5" opacity="0.7" stroke-linecap="round"/>
    <line x1="-28" y1="-55" x2="28" y2="-55" stroke="#f59e0b" stroke-width="2.5" opacity="0.7" stroke-linecap="round"/>
    <line x1="-10" y1="-30" x2="10" y2="-30" stroke="#8b5cf6" stroke-width="2.5" opacity="0.7" stroke-linecap="round"/>
    <line x1="-28" y1="-5" x2="28" y2="-5" stroke="#06b6d4" stroke-width="2.5" opacity="0.7" stroke-linecap="round"/>
    <line x1="-38" y1="20" x2="38" y2="20" stroke="#ef4444" stroke-width="2.5" opacity="0.7" stroke-linecap="round"/>
    <line x1="-35" y1="45" x2="35" y2="45" stroke="#8b5cf6" stroke-width="2.5" opacity="0.7" stroke-linecap="round"/>
    <line x1="-20" y1="70" x2="20" y2="70" stroke="#06b6d4" stroke-width="2.5" opacity="0.7" stroke-linecap="round"/>
    <line x1="-10" y1="95" x2="10" y2="95" stroke="#f59e0b" stroke-width="2.5" opacity="0.7" stroke-linecap="round"/>
    <line x1="-35" y1="120" x2="35" y2="120" stroke="#8b5cf6" stroke-width="2.5" opacity="0.7" stroke-linecap="round"/>

    <!-- Variant highlight node (the "V" in variant) -->
    <circle cx="0" cy="-5" r="12" fill="#8b5cf6" opacity="0.9" filter="url(#softGlow)"/>
    <circle cx="0" cy="-5" r="6" fill="#fff" opacity="0.9"/>
  </g>

  <!-- Data source nodes orbiting -->
  <g filter="url(#glow)">
    <circle cx="105" cy="140" r="8" fill="#06b6d4" opacity="0.8"/>
    <circle cx="80" cy="372" r="8" fill="#22c55e" opacity="0.8"/>
    <circle cx="407" cy="140" r="8" fill="#f59e0b" opacity="0.8"/>
    <circle cx="432" cy="372" r="8" fill="#ef4444" opacity="0.8"/>
    <circle cx="256" cy="72" r="8" fill="#8b5cf6" opacity="0.8"/>
    <circle cx="256" cy="440" r="8" fill="#ec4899" opacity="0.8"/>
    <circle cx="72" cy="256" r="8" fill="#14b8a6" opacity="0.8"/>
    <circle cx="440" cy="256" r="8" fill="#f97316" opacity="0.8"/>
  </g>

  <!-- Connection lines from nodes to helix -->
  <g stroke-width="1" opacity="0.2">
    <line x1="105" y1="140" x2="220" y2="200" stroke="#06b6d4"/>
    <line x1="80" y1="372" x2="220" y2="310" stroke="#22c55e"/>
    <line x1="407" y1="140" x2="292" y2="200" stroke="#f59e0b"/>
    <line x1="432" y1="372" x2="292" y2="310" stroke="#ef4444"/>
    <line x1="256" y1="72" x2="256" y2="130" stroke="#8b5cf6"/>
    <line x1="256" y1="440" x2="256" y2="382" stroke="#ec4899"/>
    <line x1="72" y1="256" x2="160" y2="256" stroke="#14b8a6"/>
    <line x1="440" y1="256" x2="352" y2="256" stroke="#f97316"/>
  </g>

  <!-- CAPVIC text -->
  <text x="256" y="475" text-anchor="middle" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="28" font-weight="700" letter-spacing="8" fill="#e2e8f0">CAPVIC</text>
</svg>
