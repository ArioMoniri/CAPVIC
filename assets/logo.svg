<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">
  <defs>
    <linearGradient id="dnaGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a3a6b"/>
      <stop offset="45%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#22d3ee"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <clipPath id="roundClip">
      <circle cx="120" cy="120" r="110"/>
    </clipPath>
  </defs>

  <!-- Minimal background -->
  <circle cx="120" cy="120" r="110" fill="#f8fafc"/>

  <!-- Stylized DNA double helix — two clean curves -->
  <g clip-path="url(#roundClip)">
    <!-- Left strand -->
    <path d="M80,30 C80,70 160,90 160,130 C160,170 80,190 80,230"
          fill="none" stroke="url(#dnaGrad)" stroke-width="18" stroke-linecap="round"/>
    <!-- Right strand -->
    <path d="M160,30 C160,70 80,90 80,130 C80,170 160,190 160,230"
          fill="none" stroke="url(#dnaGrad)" stroke-width="18" stroke-linecap="round" opacity="0.35"/>

    <!-- Base pair rungs (minimal) -->
    <line x1="95" y1="60" x2="145" y2="60" stroke="url(#accentGrad)" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
    <line x1="85" y1="95" x2="155" y2="95" stroke="url(#accentGrad)" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
    <line x1="85" y1="130" x2="155" y2="130" stroke="url(#accentGrad)" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
    <line x1="85" y1="165" x2="155" y2="165" stroke="url(#accentGrad)" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
    <line x1="95" y1="200" x2="145" y2="200" stroke="url(#accentGrad)" stroke-width="4" stroke-linecap="round" opacity="0.5"/>

    <!-- Variant highlight dot -->
    <circle cx="120" cy="130" r="10" fill="#0ea5e9"/>
    <circle cx="120" cy="130" r="4.5" fill="#fff"/>
  </g>
</svg>
